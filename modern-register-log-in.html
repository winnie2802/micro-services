<!doctype html>
<html lang="en">
<head>
    <title>Proman Micro-Services • Login</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script src="https://kit.fontawesome.com/0b420d52a0.js" crossorigin="anonymous"></script>
</head>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    
    * {
        font-family: "Poppins", sans-serif;
        margin: 0px;
        padding: 0px;
        box-sizing: border-box;
        text-decoration: none;
        list-style: none;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(90deg, #e2e2e2, #c9d6ff);
    }

    .container {
        position: relative;
        width: 850px;
        height: 550px;
        background: #fff;
        border-radius: 30px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        overflow: hidden;
    }

    .container h1 {
        font-size: 36px;
        margin: -10px 0px;
    }

    .container p {
        font-size: 14.5px;
        margin: 15px 0px;
    }

    form {
        width: 100%;
    }

    .form-box {
        position: absolute;
        right: 0px;
        width: 50%;
        height: 100%;
        background: #fff;
        display: flex;
        align-items: center;
        color: #333;
        text-align: center;
        padding: 40px;
        z-index: 1;
        transition: 0.6s ease-in-out 1.2s, visibility 0s 1s;
    }

    .container.active .form-box {
        right: 50%;
    }

    .form-box.register {
        visibility: hidden;
    }

    .container.active .form-box.register {
        visibility: visible;
    }

    .input-box {
        position: relative;
        margin: 30px 0px;
    }

    .input-box input {
        width: 100%;
        padding: 13px 50px 13px 20px;
        background: #eee;
        border-radius: 8px;
        border: none;
        outline: none;
        font-size: 16px;
        color: #333;
        font-weight: 500;
    }

    .input-box input::placeholder {
        color: #888;
        font-weight: 400;
    }

    .input-box i {
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
    }

    .forgot-link {
        margin: -15px 0px 15px;
    }

    .forgot-link a {
        font-size: 14.5px;
        color: #333;
        transition: 0.3s;
    }

    .forgot-link a:hover {
        color: #5865f2;
        text-decoration: underline;
    }

    .btn {
        width: 100%;
        height: 48px;
        background: #5865f2;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        border: none;
        outline: none;
        cursor: pointer;
        font-size: 16px;
        color: #fff;
        font-weight: 600;
        transition: 0.3s;
    }

    .btn:hover {
        opacity: 0.7;
    }

    .social-icons {
        display: flex;
        justify-content: center;
    }

    .social-icons a {
        width: 48px;
        height: 48px;
        display: inline-flex;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 24px;
        font-size: 24px;
        color: #333;
        margin: 0px 8px;
        transition: 0.3s;
    }

    .social-icons a.google-icon:hover {
        color: white;
        background: #4285f4;
        border-color: #4285f4;
    }

    .social-icons a.facebook-icon:hover {
        color: white;
        background: #0765fe;
        border-color: #0765fe;
    }

    .social-icons a.github-icon:hover {
        color: white;
        background: black;
        border-color: black;
    }

    .social-icons a.linkedin-icon:hover {
        color: white;
        background: #0a66c2;
        border-color: #0a66c2;
    }

    .toggle-box {
        position: absolute;
        width: 100%;
        height: 100%;
    }

    .toggle-box::before {
        content: '';
        position: absolute;
        left: -250%;
        width: 300%;
        height: 100%;
        background: #5865f2;
        border-radius: 150px;
        z-index: 2;
        transition: 1.8s ease-in-out;
    }

    .container.active .toggle-box::before {
        left: 50%;
    }

    .toggle-panel {
        position: absolute;
        width: 50%;
        height: 100%;
        color: #fff;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 2;
        transition: 0.6s ease-in-out;
    }

    .toggle-panel.toggle-left {
        left: 0px;
        transition-delay: 1.2s;
    }

    .container.active .toggle-panel.toggle-left {
        left: -50%;
        transition-delay: 0.6s;
    }

    .toggle-panel.toggle-right {
        right: -50%;
        transition-delay: 0.6s;
    }

    .container.active .toggle-panel.toggle-right {
        right: 0px;
        transition-delay: 1.2s;
    }

    .toggle-panel p {
        margin-bottom: 20px;
    }

    .toggle-panel .btn {
        width: 160px;
        height: 46px;
        background: transparent;
        border: 2px solid #fff;
        box-shadow: none;
    }

    .toggle-panel .btn:hover {
        color: #5865f2;
        background: white;
        opacity: 1;
    }

    .turn-back {
        position: absolute;
        top: 30px;
        left: 30px;
    }

    .turn-back i {
        background-color: white;
        color: black;

        width: 38px;
        height: 38px;
        
        font-size: medium;

        border-radius: 38px;
        
        padding: 10px;
        
        cursor: pointer;

        transition: 0.3s;
    }

    .turn-back i:hover {
        background-color: #5865f2;
        color: white;

        transform: scale(1.1);
    }

    .turn-back i:active {
        transform: scale(0.9);

        transition: 0.1s;
    }
</style>

<body>
    <div class="container">
        <div class="form-box login">
            <form action="#">
                <h1>Login</h1>
                
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="forgot-link">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn">Login</button>

                <p>--- or login with social platforms ---</p>

                <div class="social-icons">
                    <a class="google-icon" href="#"><i class="fa-brands fa-google"></i></a>
                    <a class="facebook-icon" href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a class="github-icon" href="#"><i class="fa-brands fa-github"></i></a>
                    <a class="linkedin-icon" href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>

        <div class="form-box register">
            <form action="#">
                <h1>Register</h1>
                
                <div class="input-box">
                    <input type="text" placeholder="Username" required>
                    <i class="fa-solid fa-user"></i>
                </div>

                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <button type="submit" class="btn">Register</button>

                <p>--- or register with social platforms ---</p>

                <div class="social-icons">
                    <a class="google-icon" href="#"><i class="fa-brands fa-google"></i></a>
                    <a class="facebook-icon" href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a class="github-icon" href="#"><i class="fa-brands fa-github"></i></a>
                    <a class="linkedin-icon" href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button class="btn register-btn">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button class="btn login-btn">Login</button>
            </div>
        </div>
    </div>

    <div class="turn-back" onclick="window.history.back()">
        <i class="fa-solid fa-arrow-left"></i>
    </div>
</body>

<script>
    const container = document.querySelector('.container');
    const registerBtn = document.querySelector('.register-btn');
    const loginBtn = document.querySelector('.login-btn');

    registerBtn.addEventListener('click', () => {
        container.classList.add('active');
    });

    loginBtn.addEventListener('click', () => {
        container.classList.remove('active');
    });
</script>
</html>
